<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Main Body -->
  <rect x="48" y="128" width="416" height="256" rx="32" fill="#18181b" stroke="url(#grad)" stroke-width="16"/>
  <!-- Cassette Spools -->
  <circle cx="160" cy="256" r="48" fill="#27272a" stroke="#fafafa" stroke-width="4"/>
  <circle cx="352" cy="256" r="48" fill="#27272a" stroke="#fafafa" stroke-width="4"/>
  <!-- Tape Feed -->
  <path d="M160 256 L352 256" stroke="#6366f1" stroke-width="8" stroke-dasharray="20,10"/>
  <!-- Signal Waves -->
  <path d="M200 180 Q256 140 312 180" fill="none" stroke="#a855f7" stroke-width="12" stroke-linecap="round"/>
  <path d="M180 160 Q256 100 332 160" fill="none" stroke="#6366f1" stroke-width="8" opacity="0.5" stroke-linecap="round"/>
